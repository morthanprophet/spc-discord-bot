name: SPC OH Post TEST

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force update"
        required: false
        default: "false"

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Post All Days
        run: |
         curl -H "Content-Type: application/json" \
          -d "{
            \"content\":\"🔔 TEST Update!\"
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}
          
          sleep 2
          
          TIMESTAMP=$(date +%s)
          curl -H "Content-Type: application/json" \
          -d "{
            \"embeds\":[
              {
                \"title\":\"⛈️ OH Day 1 Severe Outlook + 🌪️ [Tornado Outlook](<https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody1_TORN.png?t=$TIMESTAMP>)\",
                \"image\":{\"url\":\"https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody1_TORN.png?t=$TIMESTAMP\"}
              },
              {
                \"title\":\"⛈️ OH Day 2 Severe Outlook + [Tornado Outlook](<https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody2_TORN.png?t=$TIMESTAMP>)\",
                \"image\":{\"url\":\"https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody2_TORN.png?t=$TIMESTAMP\"}
              },
              {
                \"title\":\"⛈️ OH Day 3 Severe Outlook\",
                \"image\":{\"url\":\"https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody3_PROB.png?t=$TIMESTAMP\"}
              },
              {
                \"title\":\"⛈️ OH Day 4 Severe Outlook\",
                \"image\":{\"url\":\"https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody4_PROB.png?t=$TIMESTAMP\"}
              },
              {
                \"title\":\"⛈️ OH Day 5 Severe Outlook\",
                \"image\":{\"url\":\"https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody5_PROB.png?t=$TIMESTAMP\"}
              },
            ]
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}

          sleep 3
          
          curl -H "Content-Type: application/json" \
          -d "{
            \"content\":\"🌩️ Extended Outlooks: [Day 6](<https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody6_PROB.png?t=$TIMESTAMP>) / [Day 7](<https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody7_PROB.png?t=$TIMESTAMP>) / [Day 8](<https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody8_PROB.png?t=$TIMESTAMP>)\\n\\n🔁 Next Update: 0:00XM\"
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}
            
