name: SPC OH Post TEST

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force update"
        required: false
        default: "false"

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Post All Days
        run: |
          TIMESTAMP=$(date +%s)

          curl -H "Content-Type: application/json" \
          -d "{
            \"content\":\"🔔 12:30PM Update\\n\\n🔁 Next Update: 4:00 PM\",
            \"embeds\":[
              {
                \"title\":\"🌪️ OH Day 1 Tornado Outlook\",
                \"image\":{\"url\":\"https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody1_TORN.png?t=$TIMESTAMP\"}
              },
              {
                \"title\":\"🌪️ OH Day 2 Tornado Outlook\",
                \"image\":{\"url\":\"https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody2_TORN.png?t=$TIMESTAMP\"}
              },
              {
                \"title\":\"🌩️ OH Day 3 Severe Weather Outlook\",
                \"image\":{\"url\":\"https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody3_PROB.png?t=$TIMESTAMP\"}
              },
              {
                \"title\":\"🌩️ OH Day 4 Severe Weather Outlook\",
                \"image\":{\"url\":\"https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody4_PROB.png?t=$TIMESTAMP\"}
              }
            ]
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}

          sleep 2

          curl -H "Content-Type: application/json" \
          -d "{\"content\":\"🌩️ **Extended Outlooks**\\n\\n[OH Day 3 Severe Weather Outlook](https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody3_PROB.png?t=$TIMESTAMP)\\n[OH Day 4 Severe Weather Outlook](https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody4_PROB.png?t=$TIMESTAMP)\"}" \
          ${{ secrets.DISCORD_WEBHOOK }

          
