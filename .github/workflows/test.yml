name: SPC OH Tornado Risk (Day 1 & 2)

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force update"
        required: false
        default: "false"

jobs:
  check-risk:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: npm install @turf/turf

      - name: Download SPC Tornado Outlooks
        run: |
          curl -s https://www.spc.noaa.gov/products/outlook/day1otlk_torn.lyr.geojson -o d1.json
          curl -s https://www.spc.noaa.gov/products/outlook/day2otlk_torn.lyr.geojson -o d2.json

      - name: Download Ohio boundary
        run: |
          curl -s https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json -o states.json
          jq '.features[] | select(.properties.name=="Ohio")' states.json > ohio.json

      - name: Compute Ohio tornado risk
        id: risk
        run: |
          node << 'EOF'
          const fs = require('fs');
          const turf = require('@turf/turf');

          const ohio = JSON.parse(fs.readFileSync('ohio.json'));

          function getMaxRisk(file) {
            const data = JSON.parse(fs.readFileSync(file));
            let max = 0;

            for (const f of data.features) {
              const prob = parseInt(f.properties.LABEL);

              if (isNaN(prob)) continue;

              try {
                if (turf.booleanIntersects(f, ohio)) {
                  if (prob > max) max = prob;
                }
              } catch (e) {}
            }

            return max;
          }

          const d1 = getMaxRisk('d1.json');
          const d2 = getMaxRisk('d2.json');

          const result = `D1:${d1}|D2:${d2}`;
          fs.writeFileSync('risk.txt', result);

          console.log(result);
          EOF

          echo "status=$(cat risk.txt)" >> $GITHUB_OUTPUT

      - name: Generate hash
        id: hash
        run: |
          echo "${{ steps.risk.outputs.status }}" | sha256sum | cut -d ' ' -f1 > hash.txt
          echo "hash=$(cat hash.txt)" >> $GITHUB_OUTPUT

      - name: Restore previous hash (cache)
        uses: actions/cache@v3
        id: cache
        with:
          path: previous_hash.txt
          key: oh-risk-hash

      - name: Read old hash
        id: oldhash
        run: |
          if [ -f previous_hash.txt ]; then
            echo "oldhash=$(cat previous_hash.txt)" >> $GITHUB_OUTPUT
          else
            echo "oldhash=none" >> $GITHUB_OUTPUT
          fi

      - name: Compare hashes
        id: compare
        run: |
          if [ "${{ steps.hash.outputs.hash }}" != "${{ steps.oldhash.outputs.oldhash }}" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Post to Discord
        if: steps.compare.outputs.changed == 'true'
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\":\"🌪️ Ohio Tornado Risk Update → ${{ steps.risk.outputs.status }}\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}

      - name: Save new hash
        run: |
          echo "${{ steps.hash.outputs.hash }}" > previous_hash.txt
