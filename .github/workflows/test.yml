name: SPC OH Post TEST

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force update"
        required: false
        default: "false"

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Post All Days
        run: |
          TIMESTAMP=$(date +%s)

          # Day 3 + Day 4 (COMBINED TEXT LINKS)
          curl -H "Content-Type: application/json" \
          -d "{\"content\":\"Extended Outlooks\\n\\n⛈️ [Day 3](https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody3_PROB.png?t=$TIMESTAMP),⛈️ [Day 4](https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody4_PROB.png?t=$TIMESTAMP)\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}
