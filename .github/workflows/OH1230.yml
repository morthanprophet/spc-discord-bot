name: SPC OH Post

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force update"
        required: false
        default: "false"

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Post All Days
        run: |
          TIMESTAMP=$(date +%s)

          # Header
          curl -H "Content-Type: application/json" \
          -d "{\"content\":\"🚨 Latest Update:\\n\\n🌪️ OH Day 1 Tornado Outlook\",\"embeds\":[{\"image\":{\"url\":\"https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody1_TORN.png?t=$TIMESTAMP\"}}]}" \
          ${{ secrets.DISCORD_WEBHOOK }}

          sleep 2

          # Day 2
          curl -H "Content-Type: application/json" \
          -d "{\"content\":\"🌪️ OH Day 2 Tornado Outlook\",\"embeds\":[{\"image\":{\"url\":\"https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody2_TORN.png?t=$TIMESTAMP\"}}]}" \
          ${{ secrets.DISCORD_WEBHOOK }}

          sleep 2

          # Day 3
          curl -H "Content-Type: application/json" \
          -d "{\"content\":\"🌩️ OH Day 3 Severe Weather Outlook\",\"embeds\":[{\"image\":{\"url\":\"https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody3_PROB.png?t=$TIMESTAMP\"}}]}" \
          ${{ secrets.DISCORD_WEBHOOK }}

          sleep 2

          # Day 4
          curl -H "Content-Type: application/json" \
          -d "{\"content\":\"🌩️ OH Day 4 Severe Weather Outlook\",\"embeds\":[{\"image\":{\"url\":\"https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody4_PROB.png?t=$TIMESTAMP\"}}]}" \
          ${{ secrets.DISCORD_WEBHOOK }}
