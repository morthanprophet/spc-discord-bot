name: SPC Ohio Tornado Alerts

on:
  schedule:
    - cron: "*/10 * * * *"  # check every 10 minutes
  workflow_dispatch:

jobs:
  tornado-alert:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # -------------------
      # Install jq (for JSON parsing)
      # -------------------
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # -------------------
      # Download Day 1 + Day 2 tornado JSON
      # -------------------
      - name: Download tornado JSON
        run: |
          curl -o day1_torn.json https://www.spc.noaa.gov/products/outlook/day1otlk_torn.lyr.geojson
          curl -o day2_torn.json https://www.spc.noaa.gov/products/outlook/day2otlk_torn.lyr.geojson

      # -------------------
      # Extract Ohio risk (SLGT+ only)
      # -------------------
      - name: Parse Ohio tornado risk
        run: |
          # Day 1
          DAY1=$(jq -r '.features[] | select(.properties.STATE=="OH") | .properties.LABEL' day1_torn.json | sort | tail -n 1)
          echo "DAY1=$DAY1" >> $GITHUB_ENV

          # Day 2
          DAY2=$(jq -r '.features[] | select(.properties.STATE=="OH") | .properties.LABEL' day2_torn.json | sort | tail -n 1)
          echo "DAY2=$DAY2" >> $GITHUB_ENV

      # -------------------
      # Compare with previous risk
      # -------------------
      - name: Compare Day 1
        id: compare_day1
        run: |
          OLD=""
          [ -f last_day1.txt ] && OLD=$(cat last_day1.txt)
          if [ "$DAY1" != "$OLD" ] && [[ "$DAY1" != "MRGL" && "$DAY1" != "" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Compare Day 2
        id: compare_day2
        run: |
          OLD=""
          [ -f last_day2.txt ] && OLD=$(cat last_day2.txt)
          if [ "$DAY2" != "$OLD" ] && [[ "$DAY2" != "MRGL" && "$DAY2" != "" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      # -------------------
      # Post alerts to Discord
      # -------------------
      - name: Alert Day 1
        if: steps.compare_day1.outputs.changed == 'true'
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\":\"🌪️ Day 1 Tornado Risk Update for Ohio: $DAY1\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}

      - name: Alert Day 2
        if: steps.compare_day2.outputs.changed == 'true'
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\":\"🌪️ Day 2 Tornado Risk Update for Ohio: $DAY2\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}

      # -------------------
      # Save current risk for next comparison
      # -------------------
      - name: Save risk state
        run: |
          echo "$DAY1" > last_day1.txt
          echo "$DAY2" > last_day2.txt

      - name: Commit risk state
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add last_day1.txt last_day2.txt
          git commit -m "Update tornado risk" || echo "No changes"
          git push
