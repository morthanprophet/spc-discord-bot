name: SPC Smart Update

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  check-and-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # -------------------
      # DAY 1
      # -------------------
      - name: Download Day 1
        run: |
          curl -o day1.png https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody1_TORN.png

      - name: Hash Day 1
        run: |
          sha256sum day1.png > day1_hash.txt

      - name: Compare Day 1
        id: compare_day1
        run: |
          if [ -f last_day1_hash.txt ]; then
            if cmp -s day1_hash.txt last_day1_hash.txt; then
              echo "changed=false" >> $GITHUB_OUTPUT
            else
              echo "changed=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Post Day 1
        if: steps.compare_day1.outputs.changed == 'true'
        run: |
          TIMESTAMP=$(date +%s)
          URL="https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody1_TORN.png?t=$TIMESTAMP"

          curl -H "Content-Type: application/json" \
          -d "{\"content\":\"🌪️ Updated Day 1 Ohio Tornado Outlook\",\"embeds\":[{\"image\":{\"url\":\"$URL\"}}]}" \
          ${{ secrets.DISCORD_WEBHOOK }}

      # -------------------
      # DAY 2
      # -------------------
      - name: Download Day 2
        run: |
          curl -o day2.png https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody2_TORN.png

      - name: Hash Day 2
        run: |
          sha256sum day2.png > day2_hash.txt

      - name: Compare Day 2
        id: compare_day2
        run: |
          if [ -f last_day2_hash.txt ]; then
            if cmp -s day2_hash.txt last_day2_hash.txt; then
              echo "changed=false" >> $GITHUB_OUTPUT
            else
              echo "changed=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Post Day 2
        if: steps.compare_day2.outputs.changed == 'true'
        run: |
          TIMESTAMP=$(date +%s)
          URL="https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody2_TORN.png?t=$TIMESTAMP"

          curl -H "Content-Type: application/json" \
          -d "{\"content\":\"🌪️ Updated Day 2 Ohio Tornado Outlook\",\"embeds\":[{\"image\":{\"url\":\"$URL\"}}]}" \
          ${{ secrets.DISCORD_WEBHOOK }}

      # -------------------
      # SAVE HASHES
      # -------------------
      - name: Save hashes
        run: |
          mv day1_hash.txt last_day1_hash.txt
          mv day2_hash.txt last_day2_hash.txt

      - name: Commit hashes
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add last_day1_hash.txt last_day2_hash.txt
          git commit -m "Update hashes" || echo "No changes"
          git push
