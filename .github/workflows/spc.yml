name: SPC Smart Update

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      # -------------------
      # DOWNLOAD ALL
      # -------------------
      - name: Download Images
        run: |
          curl -o day1.png https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody1_TORN.png
          curl -o day2.png https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody2_TORN.png
          curl -o day3.png https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody3_PROB.png

      # -------------------
      # HASH ALL
      # -------------------
      - name: Hash Images
        run: |
          sha256sum day1.png > day1_hash.txt
          sha256sum day2.png > day2_hash.txt
          sha256sum day3.png > day3_hash.txt

      # -------------------
      # COMPARE ALL
      # -------------------
      - name: Compare All
        id: compare
        run: |
          DAY1_CHANGED=false
          DAY2_CHANGED=false
          DAY3_CHANGED=false

          if [ ! -f last_day1_hash.txt ] || ! cmp -s day1_hash.txt last_day1_hash.txt; then
            DAY1_CHANGED=true
          fi

          if [ ! -f last_day2_hash.txt ] || ! cmp -s day2_hash.txt last_day2_hash.txt; then
            DAY2_CHANGED=true
          fi

          if [ ! -f last_day3_hash.txt ] || ! cmp -s day3_hash.txt last_day3_hash.txt; then
            DAY3_CHANGED=true
          fi

          ANY_CHANGED=false
          if [ "$DAY1_CHANGED" = true ] || [ "$DAY2_CHANGED" = true ] || [ "$DAY3_CHANGED" = true ]; then
            ANY_CHANGED=true
          fi

          echo "day1=$DAY1_CHANGED" >> $GITHUB_OUTPUT
          echo "day2=$DAY2_CHANGED" >> $GITHUB_OUTPUT
          echo "day3=$DAY3_CHANGED" >> $GITHUB_OUTPUT
          echo "any=$ANY_CHANGED" >> $GITHUB_OUTPUT

      # -------------------
      # HEADER (ONLY IF ANY CHANGE)
      # -------------------
      - name: Post Header
        if: steps.compare.outputs.any == 'true'
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\":\"🚨 Latest Update:\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}

      # -------------------
      # DAY 1
      # -------------------
      - name: Post Day 1
        if: steps.compare.outputs.day1 == 'true'
        run: |
          TIMESTAMP=$(date +%s)

          curl -H "Content-Type: application/json" \
          -d @- ${{ secrets.DISCORD_WEBHOOK }} <<EOF
          {
            "content": "🌪️ Day 1 Tornado Outlook",
            "embeds": [{
              "image": {
                "url": "https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody1_TORN.png?t=$TIMESTAMP"
              }
            }]
          }
EOF

      # -------------------
      # DAY 2
      # -------------------
      - name: Post Day 2
        if: steps.compare.outputs.day2 == 'true'
        run: |
          TIMESTAMP=$(date +%s)

          curl -H "Content-Type: application/json" \
          -d @- ${{ secrets.DISCORD_WEBHOOK }} <<EOF
          {
            "content": "🌪️ Day 2 Tornado Outlook",
            "embeds": [{
              "image": {
                "url": "https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody2_TORN.png?t=$TIMESTAMP"
              }
            }]
          }
EOF

      # -------------------
      # DAY 3
      # -------------------
      - name: Post Day 3
        if: steps.compare.outputs.day3 == 'true'
        run: |
          TIMESTAMP=$(date +%s)

          curl -H "Content-Type: application/json" \
          -d @- ${{ secrets.DISCORD_WEBHOOK }} <<EOF
          {
            "content": "🌪️ Day 3 Severe Weather Outlook",
            "embeds": [{
              "image": {
                "url": "https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody3_PROB.png?t=$TIMESTAMP"
              }
            }]
          }
EOF

      # -------------------
      # SAVE HASHES
      # -------------------
      - name: Save hashes
        run: |
          mv day1_hash.txt last_day1_hash.txt
          mv day2_hash.txt last_day2_hash.txt
          mv day3_hash.txt last_day3_hash.txt

      - name: Commit hashes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add last_day1_hash.txt last_day2_hash.txt last_day3_hash.txt
          git commit -m "Update hashes" || echo "No changes"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
