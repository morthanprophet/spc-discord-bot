name: SPC OH Smart Update

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-and-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Pull latest changes
        run: git pull origin ${{ github.ref_name }}

      # -------------------
      # DOWNLOAD ALL DAYS
      # -------------------
      - name: Download Day 1
        run: curl -L -H "Cache-Control: no-cache" -o day1.png "https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody1_TORN.png?nocache=$(date +%s)"

      - name: Download Day 2
        run: curl -L -H "Cache-Control: no-cache" -o day2.png "https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody2_TORN.png?nocache=$(date +%s)"

      - name: Download Day 3
        run: curl -L -H "Cache-Control: no-cache" -o day3.png "https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody3_PROB.png?nocache=$(date +%s)"

      # -------------------
      # HASH ALL
      # -------------------
      - name: Hash files
        run: |
          sha256sum day1.png > day1_hash.txt
          sha256sum day2.png > day2_hash.txt
          sha256sum day3.png > day3_hash.txt

      # -------------------
      # COMPARE DAY 1
      # -------------------
      - name: Compare Day 1
        id: compare_day1
        run: |
          if [ -f last_day1_hash.txt ] && cmp -s day1_hash.txt last_day1_hash.txt; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # -------------------
      # COMPARE DAY 2
      # -------------------
      - name: Compare Day 2
        id: compare_day2
        run: |
          if [ -f last_day2_hash.txt ] && cmp -s day2_hash.txt last_day2_hash.txt; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # -------------------
      # COMPARE DAY 3
      # -------------------
      - name: Compare Day 3
        id: compare_day3
        run: |
          if [ -f last_day3_hash.txt ] && cmp -s day3_hash.txt last_day3_hash.txt; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # -------------------
      # POST (ORDERED)
      # -------------------
      - name: Post Full Outlook (Ordered)
        if: steps.compare_day1.outputs.changed == 'true' || steps.compare_day2.outputs.changed == 'true' || steps.compare_day3.outputs.changed == 'true'
        run: |
          TIMESTAMP=$(date +%s)

          URL1="https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody1_TORN.png?t=$TIMESTAMP"
          URL2="https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody2_TORN.png?t=$TIMESTAMP"
          URL3="https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody3_PROB.png?t=$TIMESTAMP"

          # Day 1 (with header)
          curl -H "Content-Type: application/json" \
          -d "{\"content\":\"🚨 Latest SPC Outlook Update (OH)\\n\\n🌪️ Day 1 Tornado Outlook\",\"embeds\":[{\"image\":{\"url\":\"$URL1\"}}]}" \
          ${{ secrets.DISCORD_WEBHOOK }}

          sleep 2

          # Day 2
          curl -H "Content-Type: application/json" \
          -d "{\"content\":\"🌪️ Day 2 Tornado Outlook\",\"embeds\":[{\"image\":{\"url\":\"$URL2\"}}]}" \
          ${{ secrets.DISCORD_WEBHOOK }}

          sleep 2

          # Day 3
          curl -H "Content-Type: application/json" \
          -d "{\"content\":\"🌪️ Day 3 Severe Weather Outlook\",\"embeds\":[{\"image\":{\"url\":\"$URL3\"}}]}" \
          ${{ secrets.DISCORD_WEBHOOK }}

      # -------------------
      # SAVE HASHES
      # -------------------
      - name: Save hashes
        run: |
          mv day1_hash.txt last_day1_hash.txt
          mv day2_hash.txt last_day2_hash.txt
          mv day3_hash.txt last_day3_hash.txt

      - name: Commit hashes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add last_day1_hash.txt last_day2_hash.txt last_day3_hash.txt
          git commit -m "Update hashes" || echo "No changes"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
