name: SPC Smart Update

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      # -------------------
      # DOWNLOAD ALL
      # -------------------
      - name: Download Images
        run: |
          curl -o day1.png https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody1_TORN.png
          curl -o day2.png https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody2_TORN.png
          curl -o day3.png https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody3_PROB.png

      # -------------------
      # HASH ALL
      # -------------------
      - name: Hash Images
        run: |
          sha256sum day1.png > day1_hash.txt
          sha256sum day2.png > day2_hash.txt
          sha256sum day3.png > day3_hash.txt

      # -------------------
      # COMPARE ALL
      # -------------------
      - name: Compare All
        id: compare
        run: |
          CHANGED=false

          for i in 1 2 3; do
            if [ -f last_day${i}_hash.txt ]; then
              if ! cmp -s day${i}_hash.txt last_day${i}_hash.txt; then
                CHANGED=true
              fi
            else
              CHANGED=true
            fi
          done

          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      # -------------------
      # POST IN ORDER
      # -------------------
      - name: Post All Days (in order)
        if: steps.compare.outputs.changed == 'true'
        run: |
          TIMESTAMP=$(date +%s)

          curl -H "Content-Type: application/json" \
          -d "{\"content\":\"🚨 Latest Update: 🌪️ OH Day 1 Tornado Outlook\",\"embeds\":[{\"image\":{\"url\":\"https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody1_TORN.png?t=$TIMESTAMP\"}}]}" \
          ${{ secrets.DISCORD_WEBHOOK }}

          sleep 2

          curl -H "Content-Type: application/json" \
          -d "{\"content\":\"🌪️ OH Day 2 Tornado Outlook\",\"embeds\":[{\"image\":{\"url\":\"https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody2_TORN.png?t=$TIMESTAMP\"}}]}" \
          ${{ secrets.DISCORD_WEBHOOK }}

          sleep 2

          curl -H "Content-Type: application/json" \
          -d "{\"content\":\"⛈️ OH Day 3 Severe Weather Outlook\",\"embeds\":[{\"image\":{\"url\":\"https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody3_PROB.png?t=$TIMESTAMP\"}}]}" \
          ${{ secrets.DISCORD_WEBHOOK }}

      # -------------------
      # SAVE HASHES
      # -------------------
      - name: Save hashes
        run: |
          mv day1_hash.txt last_day1_hash.txt
          mv day2_hash.txt last_day2_hash.txt
          mv day3_hash.txt last_day3_hash.txt

      - name: Commit hashes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add last_day1_hash.txt last_day2_hash.txt last_day3_hash.txt
          git commit -m "Update hashes" || echo "No changes"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
