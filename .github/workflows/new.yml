name: SPC OH Post NEW

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force update"
        required: false
        default: "false"

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Post All Days
        run: |
         curl -H "Content-Type: application/json" \
          -d "{
            \"content\":\"🚨 Outlook Update!\"
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}

          sleep 2

          TIMESTAMP=$(date +%s)
          curl -H "Content-Type: application/json" \
          -d "{
            \"embeds\":[
              {
                \"title\":\"Day 1: ⛈️ Severe Outlook\",
                \"image\":{\"url\":\"https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody1.png?t=$TIMESTAMP\"}
              },
              {
                \"title\":\"Day 1: 🌪️ Tornado Outlook\",
                \"image\":{\"url\":\"https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody1_TORN.png?t=$TIMESTAMP\"}
              },
              {
                \"title\":\"Day 2: ⛈️ Severe Outlook\",
                \"image\":{\"url\":\"https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody2.png?t=$TIMESTAMP\"}
              },
              {
                \"title\":\"Day 2: 🌪️ Tornado Outlook\", 
                \"image\":{\"url\":\"https://www.spc.noaa.gov/partners/outlooks/state/images/OH_swody2_TORN.png?t=$TIMESTAMP\"}
              }
            ]
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}

          sleep 2

          curl -H "Content-Type: application/json" \
          -d "{
            \"content\":\"⛈️🌪️🌨️🌬️ [View All Outlooks](<https://www.spc.noaa.gov/partners/outlooks/state/OH/>)\"
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}
